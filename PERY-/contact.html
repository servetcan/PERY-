<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ERY</title>
    <link rel="icon" type="image/png" href="pery-icon-white.png">
    <link rel="stylesheet" href="styles.css">
    </head>
<body class="contact-body">

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="perylogo.png" alt="Pery Logo" class="logo-image">
            </a>
            <nav class="navigation">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About Us</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="products-detail.html" class="nav-link">Products Detail</a>
                <a href="journal.html" class="nav-link">Journal</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </nav>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search">
                </div>
        </div>
    </header>

    <main class="contact-main">
        <h1 class="contact-title">CONTACT US</h1>

        <div class="contact-container">
            <div class="contact-form-section">
                <form class="contact-form">
                    <input type="text" placeholder="Name" class="contact-input">
                    <input type="email" placeholder="Email" class="contact-input">
                    <textarea placeholder="Message.." class="contact-input contact-textarea"></textarea>
                    <div class="btn-wrapper">
                        <button type="submit" class="contact-btn">SEND</button>
                    </div>
                </form>
            </div>

            <div class="contact-divider"></div>

            <div class="contact-info-section">
    <div class="info-item">
        <img src="phone-icon.png" alt="Phone" class="info-icon-img"> 
        <p>+90 530 094 7832</p>
    </div>
    <div class="info-item">
        <img src="web-icon.png" alt="Web" class="info-icon-img"> 
        <p>Pery@peryskincare.com</p>
    </div>
    <div class="info-item">
        <img src="location-icon.png" alt="Location" class="info-icon-img"> 
        <p>234 Karsiyaka St.100, <br> Izmir City,Turkey</p>
    </div>
</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
